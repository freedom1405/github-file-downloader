name: دانلود فایل و ساخت آرشیو چندتکه رمزدار

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل ZIP'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: دانلود فایل از لینک
        run: |
          curl -L --fail --retry 3 -o downloaded_file "${{ github.event.inputs.file_url }}"
          ls -lh downloaded_file

      - name: استخراج نام اصلی فایل
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d '?' -f1)
          [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file"
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV

      - name: ساخت آرشیو رمزدار چندتکه (هر تکه ۹۵ مگابایت)
        run: |
          # -v95m : هر جلد ۹۵ مگابایت (ایمن برای گیت)
          # -mhe=on : رمزگذاری اسم فایل‌های داخل
          # -mx=3 : فشرده‌سازی متوسط و سریع
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v95m "archive.7z" downloaded_file

      - name: حذف فایل دانلود شده (برای اینکه داخل ریپازیتوری نره)
        run: rm -f downloaded_file

      - name: Commit و Push فایل‌های چندتکه
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.7z.*
          git commit -m "Add password-protected multi-volume archive (each volume <100MB)"
          git push
